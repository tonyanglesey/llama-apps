<svg viewBox="0 0 110 132" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="lla.ma">
  <title>lla.ma</title>
  <!-- Origami llama — faceted greens for a folded-paper look.
       Starter mark: replace this file with your exact vector to swap it everywhere. -->
  <polygon points="50,8 84,16 64,32"        fill="#8cc220"/>  <!-- ear (highlight) -->
  <polygon points="64,32 104,50 76,54"      fill="#5f8f17"/>  <!-- snout (shadow) -->
  <polygon points="50,8 64,32 76,54 40,58"  fill="#7ab31d"/>  <!-- head + upper neck -->
  <polygon points="40,58 76,54 86,96 16,72" fill="#6fa61b"/>  <!-- back / body -->
  <polygon points="16,72 86,96 46,100 12,98" fill="#5f8f17"/> <!-- belly (shadow) -->
  <polygon points="86,96 92,130 76,102"     fill="#7ab31d"/>  <!-- front-right leg -->
  <polygon points="76,102 60,130 46,100"    fill="#6fa61b"/>  <!-- front-left leg -->
  <polygon points="46,100 30,130 12,98"     fill="#5f8f17"/>  <!-- back leg (shadow) -->
</svg>
